<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قرار الإجازة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; color: #2d3748; direction: rtl; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card { background: white; border-radius: 20px; padding: 48px 40px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); max-width: 480px; width: 90%; text-align: center; }
.icon { font-size: 64px; margin-bottom: 16px; }
.card h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
.card p { color: #718096; font-size: 15px; margin-bottom: 8px; line-height: 1.6; }
.detail { background: #f7fafc; border-radius: 10px; padding: 16px; margin: 20px 0; text-align: right; }
.detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px solid #e2e8f0; }
.detail-row:last-child { border-bottom: none; }
.detail-row span:first-child { color: #718096; font-weight: 600; }
.detail-row span:last-child { color: #2d3748; font-weight: 600; }
.btn-group { display: flex; gap: 12px; margin-top: 24px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 12px 28px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: inherit; transition: all 0.2s; text-decoration: none; display: inline-block; }
.btn-approve { background: #38a169; color: white; }
.btn-reject { background: #e53e3e; color: white; }
.btn-home { background: #667eea; color: white; }
.badge-approved { background: #c6f6d5; color: #276749; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 15px; display: inline-block; margin-bottom: 12px; }
.badge-rejected { background: #fed7d7; color: #9b2c2c; padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 15px; display: inline-block; margin-bottom: 12px; }
.reject-form { margin-top: 20px; }
.reject-form textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: inherit; font-size: 14px; direction: rtl; resize: vertical; min-height: 80px; }
.reject-form textarea:focus { outline: none; border-color: #e53e3e; }
</style>
</head>
<body>
<div class="card" id="main-card">
  <div class="icon">...</div>
  <h1>جاري المعالجة</h1>
</div>
<script>
const SB = 'https://wtbypuieilnicomwnwax.supabase.co';
const KEY = 'sb_publishable_T88-VXy8YDYL91hk9IgWGg_l0B6Ax4w';
async function db(path, method, body) {
  const o = { method: method||'GET', headers: {'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY,'Prefer':'return=representation'} };
  if (body) o.body = JSON.stringify(body);
  const r = await fetch(SB+'/rest/v1/'+path, o);
  return r.ok ? r.json() : null;
}
function fmt(d) { return d ? new Date(d).toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'}) : '-'; }
function days(s,e) { return Math.round((new Date(e)-new Date(s))/86400000)+1; }
async function run() {
  const p = new URLSearchParams(location.search);
  const action = p.get('action'), id = p.get('id');
  const card = document.getElementById('main-card');
  if (!action||!id) { card.innerHTML='<div class="icon">❌</div><h1>رابط غير صحيح</h1><div class="btn-group"><a href="index.html" class="btn btn-home">الرئيسية</a></div>'; return; }
  const rows = await db('leaves?select=*,employees(name)&id=eq.'+id);
  const l = rows&&rows[0];
  if (!l) { card.innerHTML='<div class="icon">❌</div><h1>الطلب غير موجود</h1><div class="btn-group"><a href="index.html" class="btn btn-home">الرئيسية</a></div>'; return; }
  if (l.status!=='pending') {
    const done = l.status==='approved'?'تمت الموافقة':'تم الرفض';
    const bc = l.status==='approved'?'badge-approved':'badge-rejected';
    const ic = l.status==='approved'?'✅':'❌';
    card.innerHTML='<div class="icon">'+ic+'</div><div class="'+bc+'">'+done+'</div><h1>تمت المعالجة مسبقاً</h1><div class="btn-group"><a href="index.html" class="btn btn-home">الرئيسية</a></div>'; return;
  }
  const emp = l.employees?l.employees.name:'-';
  const d = days(l.start_date,l.end_date);
  const details = '<div class="detail"><div class="detail-row"><span>الموظف</span><span>'+emp+'</span></div><div class="detail-row"><span>من</span><span>'+fmt(l.start_date)+'</span></div><div class="detail-row"><span>إلى</span><span>'+fmt(l.end_date)+'</span></div><div class="detail-row"><span>المدة</span><span>'+d+' يوم</span></div><div class="detail-row"><span>السبب</span><span>'+(l.reason||'-')+'</span></div></div>';
  if (action==='approve') {
    await db('leaves?id=eq.'+id,'PATCH',{status:'approved'});
    card.innerHTML='<div class="icon">✅</div><div class="badge-approved">تمت الموافقة</div><h1>تمت الموافقة على الإجازة</h1>'+details+'<p>ستظهر الإجازة في الجدول.</p><div class="btn-group"><a href="index.html" class="btn btn-home">الرئيسية</a></div>';
  } else {
    card.innerHTML='<div class="icon">⚠️</div><h1>رفض طلب الإجازة</h1>'+details+'<div class="reject-form"><textarea id="rn" placeholder="سبب الرفض (اختياري)..."></textarea></div><div class="btn-group"><button onclick="doReject('+id+')" class="btn btn-reject">تأكيد الرفض</button><a href="index.html" class="btn btn-home">إلغاء</a></div>';
  }
}
async function doReject(id) {
  const notes = document.getElementById('rn')?document.getElementById('rn').value:'';
  await db('leaves?id=eq.'+id,'PATCH',{status:'rejected',notes:notes});
  document.getElementById('main-card').innerHTML='<div class="icon">❌</div><div class="badge-rejected">تم الرفض</div><h1>تم رفض الطلب</h1><div class="btn-group"><a href="index.html" class="btn btn-home">الرئيسية</a></div>';
}
run();
</script>
</body>
</html>
